<div class="table-responsive">
    <table class="table table-hover table-striped table-minimal align-middle mb-0">
        <thead>
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                <th>Department</th>
                <th>GPA</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let student of students">
                <td>{{ student.id }}</td>
                <td>{{ student.firstName }}</td>
                <td>{{ student.lastName }}</td>
                <td>{{ student.age }}</td>
                <td>{{ student.department }}</td>
                <td>{{ student.GPA }}</td>
                <td>
                    <div class="d-flex flex-wrap gap-2">
                        <button (click)="onView(student.id)" class="btn btn-sm btn-success" type="button">
                            <i class="fas fa-eye"></i> View
                        </button>

                        <button (click)="onDelete(student.id)" class="btn btn-sm btn-danger" type="button">
                            <i class="fas fa-trash-alt"></i> Delete
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
