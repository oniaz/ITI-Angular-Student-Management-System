<section class="page-wrap">
    <div class="page-head">
        <div>
            <h1 class="page-title">Add Student</h1>
        </div>
    </div>

    <div class="add-choice-panel mb-4">
        <div class="add-choice-top">
            <div>
                <h6 class="mb-1">Quick Add Demo Data</h6>
                <p class="add-choice-copy mb-0">Instantly add a pre-filled student record for testing.</p>
            </div>
            <button type="button" class="btn btn-dark px-4" (click)="addStudentGahez()">Add Demo Data</button>
        </div>

        <div class="add-choice-divider" aria-hidden="true">
            <span>OR</span>
        </div>

        <p class="add-choice-manual mb-2">Fill in the form below to add a new student.</p>
        <div class="surface-card p-md-4">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">First Name</label>
                    <input type="text" #firstName class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">Last Name</label>
                    <input type="text" #lastName class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold">Age</label>
                    <input type="number" #age class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold">Gender</label>
                    <select #gender class="form-select">
                        <option value="" disabled selected>Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label small fw-semibold">Email</label>
                    <input type="email" #email class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-semibold">Phone</label>
                    <input type="text" #phone class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-semibold">Address</label>
                    <input type="text" #address class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">City</label>
                    <input type="text" #city class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Country</label>
                    <input type="text" #country class="form-control">
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">Department</label>
                    <input type="text" #department class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold">Level</label>
                    <input type="number" #level class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold">GPA</label>
                    <input type="number" step="0.1" #GPA class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">Enrollment Date</label>
                    <input type="date" #enrollmentDate class="form-control">
                </div>
            </div>

            <div class="form-check form-switch mb-4">
                <input class="form-check-input" type="checkbox" #isActive id="activeSwitch" checked>
                <label class="form-check-label" for="activeSwitch">Set as Active Student</label>
            </div>

            <div class="minimal-divider pt-3 d-flex flex-wrap gap-2">
                <button class="btn btn-success px-4" (click)="addStudent(
          firstName.value, lastName.value, age.value, gender.value,
          email.value, phone.value, address.value, city.value,
          country.value, department.value, level.value, GPA.value,
          enrollmentDate.value, isActive.checked
        )">
                    Save Student
                </button>
                <button routerLink="/students" class="btn btn-outline-dark">Cancel</button>
            </div>
        </div>
    </div>


</section>
