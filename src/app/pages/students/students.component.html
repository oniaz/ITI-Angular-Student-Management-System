<section class="page-wrap">
	<div class="page-head">
		<div>
			<h1 class="page-title">Students</h1>
			<p class="page-subtitle">View and manage all student data</p>
		</div>
	</div>

	<div class="surface-card p-md-2" >
		<app-student-table
			[students]="studentsData$ | async"
			(deleteStudent)="onDelete($event)"
			(viewStudent)="onView($event)">
		</app-student-table>
	</div>
</section>
